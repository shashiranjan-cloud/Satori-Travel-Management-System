<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code.xs</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='80' x='15' font-size='90' font-family='sans-serif' font-weight='900' fill='%2300b85c'>X</text></svg>" type="image/svg+xml">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>

    <!-- LOGIN SCREEN -->
    <div id="loginScreen" class="screen active">
        <div class="animation-container">
            <!-- Drawn SVG Plane (No Emoji) -->
            <svg id="planeIcon" class="plane-animation" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M17.8 19.2 16 11l3.5-3.5C21 6 21.5 4 21 3c-1-.5-3 0-4.5 1.5L13 8 4.8 6.2c-.5-.1-.9.2-1.1.6L3 8l6 3.5L7 15l-3.5-1L2 15l3 4 4 3 1-1.5-1-3.5 3.5-2 3.5 6c.4.2.8 0 1-.5l1.6-3.8c0-.4-.1-.8-.4-1z"/>
            </svg>
            <!-- Floating texts removed as requested -->
            <div class="animated-logo" id="animLogoText">Satori</div>
        </div>

        <div class="login-box">
            <h2>Satori</h2>
            <div id="errorBox" class="error-box"></div>
            <div class="input-group">
                <label>Username</label>
                <input type="text" id="username" placeholder="Enter username" oninput="this.value = this.value.replace(/[0-9]/g, '')">
            </div>
            <div class="input-group">
                <label>Password</label>
                <div style="position: relative;">
                    <input type="password" id="password" placeholder="Enter password" style="padding-right: 40px;">
                    <span onclick="togglePassword()" style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; opacity: 0.8; font-size: 1.2rem;">👁️</span>
                </div>
            </div>
            <button type="button" id="loginBtn" onclick="handleAuth('login')">Login</button>
            <button type="button" class="secondary" onclick="handleAuth('register')">Register</button>
        </div>
    </div>

    <!-- MAIN DASHBOARD SCREEN -->
    <div id="dashboardScreen" class="screen">
        <aside class="sidebar">
            <div class="brand">
                <svg class="brand-logo" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M17.8 19.2 16 11l3.5-3.5C21 6 21.5 4 21 3c-1-.5-3 0-4.5 1.5L13 8 4.8 6.2c-.5-.1-.9.2-1.1.6L3 8l6 3.5L7 15l-3.5-1L2 15l3 4 4 3 1-1.5-1-3.5 3.5-2 3.5 6c.4.2.8 0 1-.5l1.6-3.8c0-.4-.1-.8-.4-1z"/>
                </svg>
                <span>Satori</span>
            </div>
            <nav>
                <ul>
                    <li class="active" onclick="switchTab('dashboard')">Dashboard</li>
                    <li onclick="switchTab('locations')">Locations</li>
                    <li onclick="switchTab('hotels')">Hotels</li>
                    <li onclick="switchTab('cars')">Cars</li>
                    <li onclick="switchTab('restaurants')">Restaurants</li>
                    <li onclick="switchTab('hidden')">Hidden Places</li>
                    <li onclick="switchTab('bookings')">Bookings</li>
                    <li onclick="switchTab('membership')">Membership</li>
                    <li onclick="switchTab('settings')">Settings</li>
                </ul>
            </nav>
            <div class="user-info">
                <div id="welcomeMessage">Hello, User</div>
                <div id="membershipBadge" class="badge">Normal Member</div>
            </div>
        </aside>

        <main class="content-area">
            <header>
                <h1 id="pageTitle">Overview</h1>
                <div class="header-actions">
                    <button class="icon-btn" onclick="toggleTheme()">🌓</button>
                    <button class="icon-btn" onclick="logout()">Logout</button>
                </div>
            </header>
            
            <div id="contentContainer" class="content-container">
                <!-- Dynamic Content Goes Here -->
            </div>
        </main>
    </div>

    <!-- Modal for Adding Location -->
    <div id="locationModal" class="modal-overlay" style="display: none;">
        <div class="modal-box">
            <h2>Add New Location</h2>
            <div class="input-group">
                <label>Name (e.g., Mountain Resort)</label>
                <input type="text" id="locName" placeholder="Location Name">
            </div>
            <div class="input-group">
                <label>Type</label>
                <input type="text" id="locType" placeholder="e.g., Location, Hotel, Restaurant">
            </div>
            <div class="input-group">
                <label>Price</label>
                <input type="text" id="locPrice" placeholder="e.g., $100/night">
            </div>
            <div class="input-group">
                <label>Description</label>
                <input type="text" id="locDesc" placeholder="Brief description">
            </div>
            <div style="display: flex; gap: 10px;">
                <button onclick="submitNewLocation()">Save Location</button>
                <button class="secondary" onclick="toggleAddLocationModal(false)">Cancel</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
